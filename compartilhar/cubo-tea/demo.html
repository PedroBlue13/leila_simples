<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · Cubo TEA</title>
  <link rel="stylesheet" href="cubo-tea.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background: #eef6f0;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(100%, 520px);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      color: #24352c;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
    }

    p {
      margin: 0 0 24px;
      color: #647069;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Cubo TEA</h1>
    <p>Arraste o cubo para interagir com a cena 3D.</p>

    <div
      class="tea-cube-widget"
      data-tea-cube
      data-colors="#2F6FB0,#4F9D69,#F2C94C,#D95D5D"
      role="img"
      aria-label="Cubo interativo nas cores azul, verde, amarelo e vermelho"
    >
      <div class="tea-cube-widget__fallback" aria-hidden="true">
        <div class="tea-cube-widget__css-cube">
          <span class="tea-cube-widget__face tea-cube-widget__front"></span>
          <span class="tea-cube-widget__face tea-cube-widget__back"></span>
          <span class="tea-cube-widget__face tea-cube-widget__right"></span>
          <span class="tea-cube-widget__face tea-cube-widget__left"></span>
          <span class="tea-cube-widget__face tea-cube-widget__top"></span>
          <span class="tea-cube-widget__face tea-cube-widget__bottom"></span>
        </div>
      </div>
      <canvas class="tea-cube-widget__canvas" aria-hidden="true"></canvas>
      <div class="tea-cube-widget__status" role="status">Carregando cubo interativo…</div>
    </div>
  </main>

  <script src="cubo-tea.js"></script>
</body>
</html>
